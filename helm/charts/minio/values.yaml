# MinIO Helm Chart - Development Defaults
# S3-compatible object storage for CallTelemetry
# Note: Credentials are auto-generated by credential-generator pre-install hook
# To use custom credentials, set auth.existingSecret to reference your secret

# Override the chart name (defaults to "minio")
nameOverride: ""
# Override the full name - defaults to "minio" for simple service name
fullnameOverride: "minio"

replicaCount: 1

image:
  repository: minio/minio
  tag: latest
  pullPolicy: IfNotPresent

# MinIO credentials
auth:
  rootUser: minioadmin
  rootPassword: minioadmin
  # Use existing secret instead of creating one
  # Set to "minio-credentials" to use credentials from credential-generator hook
  # existingSecret: "minio-credentials"
  # To use auto-generated credentials:
  # 1. Leave existingSecret empty (default)
  # 2. The credential-generator pre-install hook will create minio-credentials secret
  # 3. Update this to reference it if you want to use those generated credentials
  existingSecret: ""

# Prometheus metrics configuration
metrics:
  # Enable public access to Prometheus metrics (no auth required)
  authType: "public"

service:
  type: ClusterIP
  apiPort: 9000
  consolePort: 9001

# Persistent storage
persistence:
  enabled: true
  # storageClass: Leave empty to use cluster default (local-path on K3s, longhorn if installed)
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  # Use existing PVC
  existingClaim: ""

# Buckets to create on startup
# ct-audio: Audio greetings and transcoded files
buckets:
  - name: ct-audio

# Init job to create buckets (runs as a Job, not Helm hook for Tilt compatibility)
bucketInit:
  enabled: true
  # Use Helm hooks (set to false for Tilt which doesn't support hooks)
  useHelmHooks: true
  image:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Health check configuration
healthCheck:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10

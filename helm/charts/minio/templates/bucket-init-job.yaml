{{- if .Values.bucketInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "minio.fullname" . }}-bucket-init
  labels:
    {{- include "minio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "minio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: "{{ .Values.bucketInit.image.repository }}:{{ .Values.bucketInit.image.tag }}"
          imagePullPolicy: {{ .Values.bucketInit.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Configuring MinIO alias..."
              mc alias set myminio http://{{ include "minio.fullname" . }}:{{ .Values.service.apiPort }} $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD

              echo "Waiting for MinIO to be ready..."
              until mc admin info myminio >/dev/null 2>&1; do
                echo "MinIO not ready yet, retrying..."
                sleep 2
              done

              echo "Creating buckets..."
              {{- range .Values.buckets }}
              mc mb --ignore-existing myminio/{{ .name }}
              {{- if .policy }}
              mc anonymous set {{ .policy }} myminio/{{ .name }} || true
              {{- end }}
              {{- if .lifecycle }}
              {{- if .lifecycle.expiry_days }}
              echo "Setting {{ .lifecycle.expiry_days }}-day lifecycle policy on {{ .name }}..."
              mc ilm rule add --expire-days {{ .lifecycle.expiry_days }} myminio/{{ .name }} || echo "Lifecycle policy may already exist for {{ .name }}"
              {{- end }}
              {{- end }}
              {{- end }}

              echo "Listing buckets..."
              mc ls myminio

              echo "MinIO bucket initialization complete!"
          envFrom:
            - secretRef:
                name: {{ include "minio.secretName" . }}
{{- end }}

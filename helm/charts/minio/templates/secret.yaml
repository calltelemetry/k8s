{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "minio.secretName" . }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.auth.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.auth.rootPassword | quote }}
{{- end }}

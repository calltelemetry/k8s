{{/*
NATS Server Deployment
Includes optional Prometheus exporter sidecar
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nats.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nats.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "nats.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nats.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # NATS Server
        - name: nats
          image: {{ include "nats.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.config.port }}
              name: client
            - containerPort: {{ .Values.config.httpPort }}
              name: monitor
          args:
            - "--config"
            - "/etc/nats/nats.conf"
          volumeMounts:
            - name: config
              mountPath: /etc/nats
            {{- if .Values.jetstream.enabled }}
            - name: data
              mountPath: {{ .Values.jetstream.storeDir }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Liveness: is the NATS process alive? (monitoring HTTP endpoint)
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.config.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Readiness: can NATS accept client connections AND is JetStream healthy?
          # TCP check on client port ensures the server accepts connections.
          # The /healthz endpoint alone doesn't verify JetStream or client connectivity.
          readinessProbe:
            tcpSocket:
              port: {{ .Values.config.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          # Startup: give NATS time to load JetStream data on boot
          startupProbe:
            tcpSocket:
              port: {{ .Values.config.port }}
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 30

        {{- if .Values.exporter.enabled }}
        # Prometheus NATS Exporter sidecar
        - name: nats-exporter
          image: {{ include "nats.exporterImage" . }}
          imagePullPolicy: {{ .Values.exporter.image.pullPolicy }}
          args:
            {{- range .Values.exporter.flags }}
            - {{ . | quote }}
            {{- end }}
            - "http://localhost:{{ .Values.config.httpPort }}"
          ports:
            - containerPort: 7777
              name: metrics
          resources:
            {{- toYaml .Values.exporter.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: 7777
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: 7777
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
        {{- end }}

      # Init container validates config is mounted before NATS starts
      initContainers:
        - name: wait-for-config
          image: {{ include "nats.image" . }}
          command: ['sh', '-c', 'until test -f /etc/nats/nats.conf; do echo "Waiting for config..."; sleep 1; done; echo "Config ready"']
          volumeMounts:
            - name: config
              mountPath: /etc/nats
      volumes:
        - name: config
          configMap:
            name: {{ include "nats.configMapName" . }}
            optional: true
        {{- if .Values.jetstream.enabled }}
        - name: data
          {{- if eq .Values.storage.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "nats.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}

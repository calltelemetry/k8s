{{/*
NATS Service
Exposes client, monitor, and metrics ports
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nats.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nats.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.config.port }}
      targetPort: client
      name: client
    - port: {{ .Values.config.httpPort }}
      targetPort: monitor
      name: monitor
    {{- if .Values.exporter.enabled }}
    - port: 7777
      targetPort: metrics
      name: metrics
    {{- end }}
  selector:
    {{- include "nats.selectorLabels" . | nindent 4 }}

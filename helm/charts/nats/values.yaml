# NATS Helm Chart - Development Defaults
# Simple single-node NATS with JetStream
# Prod: Use values-production.yaml for clustering
#
# Note: Credentials can be auto-generated by credential-generator pre-install hook
# To use auto-generated credentials from the hook, ensure the nats-credentials secret
# is created by credential-generator, then reference it in your deployment

# Override the chart name (defaults to "nats")
nameOverride: ""
# Override the full name - defaults to "nats" for simple service names
fullnameOverride: "nats"

# NATS server image
image:
  repository: nats
  tag: "alpine"
  pullPolicy: IfNotPresent

# Number of replicas (1 for dev, 3+ for HA in prod)
replicas: 1

# NATS server configuration
config:
  # Client port
  port: 4222
  # HTTP monitoring port
  httpPort: 8222
  # Debug/trace logging
  debug: false
  trace: false
  logtime: true
  # Maximum message payload (5MB)
  maxPayload: "5MB"

# JetStream configuration
jetstream:
  enabled: true
  # Storage directory inside container
  storeDir: /data/jetstream
  # Memory storage limit
  maxMemoryStore: "256MB"
  # File storage limit
  maxFileStore: "1GB"

# Storage configuration
storage:
  # Use emptyDir for dev (ephemeral), PVC for prod
  type: emptyDir
  # PVC settings (only used when type: pvc)
  size: 5Gi
  storageClass: ""

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Prometheus NATS Exporter sidecar
exporter:
  enabled: true
  image:
    repository: natsio/prometheus-nats-exporter
    tag: "0.19.1"
    pullPolicy: IfNotPresent
  # Metrics to export
  flags:
    - "-varz"
    - "-jsz=all"
    - "-connz"
    - "-routez"
    - "-subz"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

# Service configuration
service:
  type: ClusterIP
  # Annotations for the service
  annotations: {}

# Monitoring configuration
monitoring:
  # Enable ServiceMonitor for Prometheus Operator
  enableServiceMonitor: false

# Node selector (empty for dev)
nodeSelector: {}

# Tolerations (empty for dev)
tolerations: []

# Affinity rules (empty for dev)
affinity: {}

# JetStream resource setup (streams, KV, ObjectStore)
# These are created by a post-install Job
jetstreamSetup:
  enabled: true
  image: natsio/nats-box:0.14.5
  # Streams to create
  streams:
    - name: JTAPI_EVENTS
      subjects:
        - "jtapi.v1.org.*.events.*"
        - "jtapi.v1.org.*.status.*"
      retention: limits
      maxMsgs: 100000
      maxAge: 24h
      storage: file
      replicas: 1
      discard: old
      maxMsgSize: 1MB
      dupeWindow: 2m
  # KV buckets to create
  kvBuckets:
    - name: jtapi-greeting-policies-default
      history: 5
      replicas: 1
  # ObjectStore buckets to create
  objectBuckets:
    - name: jtapi-jars-default
      replicas: 1

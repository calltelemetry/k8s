# Standard product-stack values.
#
# Deployment environments should override this file rather than forking the
# chart. Required runtime images are API and vue-web. Optional services,
# including the Caddy gateway, stay disabled until explicitly enabled by
# values. Keep component images in their component slots: SPA image values go
# under vue-web, Caddy/gateway image values go under caddy.

# API chart overrides. Common keys: api.image/api.tag, admin.image/admin.tag,
# hostname, environment, db.values, preview.seedLevel. Required subcharts own
# their default image settings; the stack chart only carries environment
# overrides.
api: {}

# SPA chart overrides. Common keys: image.repository/image.tag,
# ingress.enabled, ingress.hosts, service.port. Required subcharts own their
# default image settings; the stack chart only carries environment overrides.
vue-web: {}

# Optional edge gateway. Enable this when the environment wants one public
# origin for SPA and API traffic. Do not put the SPA image here; caddy.image is
# only for the Caddy gateway image.
caddy:
  enabled: false
  image:
    repository: calltelemetry/caddy
    tag: "2.11.3"
    pullPolicy: IfNotPresent
  ingress:
    enabled: false
    ingressClassName: ""
    annotations: {}
    hosts:
      - host: app.calltelemetry.com
        paths:
          - /
    tls: []
  routes:
    api:
      service: admin-internal-service
      port: 4000
    spa:
      service: ct-vue
      port: 8080

jtapi-sidecar:
  enabled: false
  image:
    repository: calltelemetry/jtapi-sidecar
    tag: "1.0.0"
    pullPolicy: IfNotPresent

jtapi-operator:
  enabled: false
  image:
    repository: calltelemetry/jtapi-operator
    tag: "0.1.0"
    pullPolicy: IfNotPresent

ct-media:
  enabled: false
  image:
    repository: calltelemetry/ct-media
    tag: "0.1.0"
    pullPolicy: IfNotPresent

syslog:
  enabled: false
  image:
    repository: calltelemetry/ct-syslog-ingest
    tag: "0.1.0"
    pullPolicy: IfNotPresent

traceroute:
  enabled: false
  image:
    repository: calltelemetry/traceroute
    tag: "0.8.3"
    pullPolicy: IfNotPresent

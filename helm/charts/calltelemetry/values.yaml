# Standard product-stack values.
#
# Deployment environments should override this file rather than forking the
# chart. Required runtime components are API, vue-web, and the Caddy gateway.
# Optional backend services stay disabled until explicitly enabled by values.
# Keep component images in their component slots: SPA image values go under
# vue-web, Caddy/gateway image values go under caddy.

# API chart overrides. Common keys: api.image/api.tag, admin.image/admin.tag,
# hostname, environment, db.values, preview.seedLevel. Required subcharts own
# their default image settings; the stack chart only carries environment
# overrides.
api: {}

# SPA chart overrides. Common keys: image.repository/image.tag,
# ingress.enabled, ingress.hosts, service.port. Required subcharts own their
# default image settings; the stack chart only carries environment overrides.
vue-web: {}

# Required edge gateway. This is the standard public entrypoint for SPA and API
# traffic. Do not put the SPA image here; caddy.image is only for the Caddy
# gateway image.
caddy:
  image:
    repository: calltelemetry/caddy
    tag: "2.11.3"
    pullPolicy: IfNotPresent
  ingress:
    enabled: false
    ingressClassName: ""
    annotations: {}
    hosts:
      - host: app.calltelemetry.com
        paths:
          - /
    tls: []
  routes:
    api:
      service: admin-internal-service
      port: 4000
    spa:
      service: ct-vue
      port: 8080

jtapi-sidecar:
  enabled: false
  replicaCount: 1
  image:
    repository: calltelemetry/jtapi-sidecar
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  grpc:
    port: 50051
  nats:
    url: "nats://nats:4222"
  websocket:
    enabled: false
    url: "ws://admin-service:4000/socket/jtapi/websocket"
  otel:
    enabled: true
    endpoint: "http://otel-collector:4318/v1/traces"
    samplingProbability: "0.1"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

jtapi-operator:
  enabled: false
  replicaCount: 1
  image:
    repository: calltelemetry/jtapi-operator
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  nats:
    url: "nats://nats:4222"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

ct-media:
  enabled: false
  replicaCount: 1
  image:
    repository: calltelemetry/ct-media
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 50053
  otel:
    enabled: true
    endpoint: "http://otel-collector:4317"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

syslog:
  enabled: false
  replicaCount: 1
  image:
    repository: calltelemetry/ct-syslog-ingest
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    udp:
      type: ClusterIP
      port: 514
    health:
      type: ClusterIP
      port: 5514
  nats:
    url: "nats://nats:4222"
  otel:
    enabled: false
    endpoint: "http://otel-collector:4318"
  serviceMonitor:
    enabled: true
    interval: 15s
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

traceroute:
  enabled: false
  replicaCount: 1
  image:
    repository: calltelemetry/traceroute
    tag: "0.8.3"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4100
    targetPort: 4100
  nats:
    server: "nats"
  resources:
    requests:
      cpu: 256m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 256Mi

# SeaweedFS Helm Chart - Development Defaults
# S3-compatible object storage for CallTelemetry
# Note: Credentials are auto-generated by credential-generator pre-install hook
# To use custom credentials, set auth.existingSecret to reference your secret

# Override the chart name (defaults to "seaweedfs")
nameOverride: ""
# Override the full name - defaults to "seaweedfs" for simple service name
fullnameOverride: "seaweedfs"

replicaCount: 1

image:
  repository: chrislusf/seaweedfs
  tag: latest
  pullPolicy: IfNotPresent

# SeaweedFS S3 credentials — leave empty to require explicit override or credential-generator
auth:
  accessKey: ""
  secretKey: ""
  # Use existing secret instead of creating one
  # Set to "seaweedfs-credentials" to use credentials from credential-generator hook
  existingSecret: ""

service:
  type: ClusterIP
  s3Port: 8333
  filerPort: 8888
  masterPort: 9333

# Persistent storage
persistence:
  enabled: true
  # storageClass: Leave empty to use cluster default (local-path on K3s, longhorn if installed)
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  # Use existing PVC
  existingClaim: ""

# S3 configuration for SeaweedFS
# Note: s3Config is only used if NOT using auth.existingSecret.
# With credential-generator, set auth.existingSecret: "seaweedfs-credentials"
s3Config:
  admin:
    actions:
      - Admin
      - Read
      - Write
      - List
      - Tagging

# Buckets to create on startup
# ct-audio: Audio greetings and transcoded files
buckets:
  - name: ct-audio

# Init job to create buckets (runs as a Job, not Helm hook for Tilt compatibility)
bucketInit:
  enabled: true
  # Use Helm hooks (set to false for Tilt which doesn't support hooks)
  useHelmHooks: true
  image:
    repository: amazon/aws-cli
    tag: latest
    pullPolicy: IfNotPresent

# Master volume size limit in MB
masterVolumeSizeLimitMB: 100

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Health check configuration
healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 15

{{- if .Values.bucketInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "seaweedfs.fullname" . }}-bucket-init
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
  {{- if .Values.bucketInit.useHelmHooks }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
  {{- end }}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "seaweedfs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: aws-cli
          image: "{{ .Values.bucketInit.image.repository }}:{{ .Values.bucketInit.image.tag }}"
          imagePullPolicy: {{ .Values.bucketInit.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for SeaweedFS S3 to be ready..."
              for i in $(seq 1 30); do
                aws --endpoint-url http://{{ include "seaweedfs.fullname" . }}:{{ .Values.service.s3Port }} s3 ls 2>/dev/null && break
                echo "Waiting for SeaweedFS... ($i/30)"
                sleep 2
              done

              echo "Creating buckets..."
              {{- range .Values.buckets }}
              aws --endpoint-url http://{{ include "seaweedfs.fullname" $ }}:{{ $.Values.service.s3Port }} s3 mb s3://{{ .name }} 2>/dev/null || true
              {{- end }}

              echo "Listing buckets..."
              aws --endpoint-url http://{{ include "seaweedfs.fullname" . }}:{{ .Values.service.s3Port }} s3 ls

              echo "SeaweedFS bucket initialization complete!"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "seaweedfs.secretName" . }}
                  key: S3_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "seaweedfs.secretName" . }}
                  key: S3_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
{{- end }}

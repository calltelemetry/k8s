{{- /*
  S3 identity configuration as a Secret (not ConfigMap).
  When auth.existingSecret is set, credentials are read from that secret.
  Otherwise, credentials come from auth.accessKey/secretKey values.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "seaweedfs.fullname" . }}-s3-config
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
type: Opaque
stringData:
  s3.json: |
    {
      "identities": [
        {
          "name": "admin",
          "credentials": [
            {
              "accessKey": {{ .Values.auth.accessKey | default "admin" | quote }},
              "secretKey": {{ .Values.auth.secretKey | default "admin" | quote }}
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }

apiVersion: v1
kind: Service
metadata:
  name: {{ include "seaweedfs.fullname" . }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.s3Port }}
      targetPort: s3
      protocol: TCP
      name: s3
    - port: {{ .Values.service.filerPort }}
      targetPort: filer
      protocol: TCP
      name: filer
    - port: {{ .Values.service.masterPort }}
      targetPort: master
      protocol: TCP
      name: master
  selector:
    {{- include "seaweedfs.selectorLabels" . | nindent 4 }}

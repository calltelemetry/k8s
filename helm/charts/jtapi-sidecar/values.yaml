# jtapi-sidecar Helm Chart - CallTelemetry Defaults
# Java JTAPI sidecar for Cisco phone control and audio injection

# Override the full name - defaults to "jtapi-sidecar" for simple service name
fullnameOverride: "jtapi-sidecar"

replicaCount: 1

image:
  repository: calltelemetry/jtapi-sidecar
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# gRPC server configuration (used by Elixir backend for call control)
grpc:
  port: 50051

# JTAPI Sidecar configuration
jtapi:
  port: 8080
  jarPath: /app/jars
  watchJars: true
  restartDelaySeconds: 5
  logLevel: INFO

# NATS configuration
nats:
  url: "nats://nats:4222"

# CUCM connection configuration
cucm:
  host: ""
  ctiPort: 2748
  user: ""
  password: ""
  # Use existing secret for CUCM credentials
  existingSecret: ""
  # Keys in the secret
  secretKeys:
    host: CUCM_HOST
    user: CUCM_JTAPI_USER
    password: CUCM_JTAPI_PASSWORD

# WebSocket connection to CallTelemetry backend
websocket:
  enabled: false
  url: "ws://admin-service:4000/socket/jtapi/websocket"
  serverId: "jtapi-1"
  authToken: ""
  # Use existing secret for auth token
  existingSecret: ""
  secretKey: WEBSOCKET_AUTH_TOKEN
  autoReconnect: true
  reconnectDelay: 1000
  reconnectMaxDelay: 60000
  backoffMultiplier: 2.0
  maxReconnectAttempts: 0
  heartbeatInterval: 30000
  connectTimeout: 10000

# Connection pool settings
connectionPool:
  maxConnections: 10
  connectionTimeout: 30000
  callTimeout: 60000
  maxConcurrentCalls: 50

# NATS-based JAR distribution init container
jarInit:
  enabled: true
  image: natsio/nats-box:0.14.5
  timeoutSeconds: 120
  objectStoreBucket: "jtapi-jars-default"

# Persistent storage for JTAPI JARs and audio files
persistence:
  jars:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 100Mi
    existingClaim: ""
  audio:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 500Mi
    existingClaim: ""

# MinIO configuration for audio asset cache
minio:
  enabled: true
  endpoint: "http://minio:9000"

# OpenTelemetry configuration
otel:
  enabled: true
  serviceName: "jtapi-sidecar"
  endpoint: "http://otel-collector:4317"
  samplingProbability: "0.1"

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

nodeSelector: {}

tolerations: []

affinity: {}

# Health check configuration
healthCheck:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 60
    periodSeconds: 30
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 30
    periodSeconds: 10

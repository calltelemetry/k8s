apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jtapi-sidecar.fullname" . }}
  labels:
    {{- include "jtapi-sidecar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "jtapi-sidecar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jtapi-sidecar.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.jarInit.enabled }}
      initContainers:
        - name: jar-downloader
          image: {{ .Values.jarInit.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              NATS_URL="{{ .Values.nats.url }}"
              JAR_DIR="{{ .Values.jtapi.jarPath }}"
              BUCKET="{{ .Values.jarInit.objectStoreBucket }}"
              TIMEOUT={{ .Values.jarInit.timeoutSeconds }}

              echo "Downloading jtapi.jar from NATS ObjectStore..."

              ELAPSED=0
              while [ $ELAPSED -lt $TIMEOUT ]; do
                if nats object get "$BUCKET" jtapi.jar -s "$NATS_URL" -O "$JAR_DIR/jtapi.jar" --force 2>/dev/null; then
                  echo "Successfully downloaded jtapi.jar"
                  ls -la "$JAR_DIR/"
                  exit 0
                fi
                echo "Waiting for jtapi.jar... ($ELAPSED/${TIMEOUT}s)"
                sleep 2
                ELAPSED=$((ELAPSED + 2))
              done

              echo "ERROR: Failed to download jtapi.jar after ${TIMEOUT}s"
              exit 1
          volumeMounts:
            - name: jtapi-jars
              mountPath: {{ .Values.jtapi.jarPath }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.jtapi.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.grpc.port }}
              protocol: TCP
          env:
            # Pod identity
            - name: POD_NAME
              value: {{ include "jtapi-sidecar.fullname" . }}
            # gRPC server port
            - name: grpc.server.port
              value: {{ .Values.grpc.port | quote }}
            # JTAPI Configuration
            - name: JTAPI_PORT
              value: {{ .Values.jtapi.port | quote }}
            - name: JTAPI_JAR_PATH
              value: {{ .Values.jtapi.jarPath | quote }}
            - name: WATCH_JARS
              value: {{ .Values.jtapi.watchJars | quote }}
            - name: RESTART_DELAY_SECONDS
              value: {{ .Values.jtapi.restartDelaySeconds | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.jtapi.logLevel | quote }}
            # NATS Configuration
            - name: NATS_URL
              value: {{ .Values.nats.url | quote }}
            # CUCM Configuration
            - name: CUCM_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "jtapi-sidecar.cucmSecretName" . }}
                  key: {{ .Values.cucm.secretKeys.host }}
            - name: CUCM_CTI_PORT
              value: {{ .Values.cucm.ctiPort | quote }}
            - name: CUCM_JTAPI_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "jtapi-sidecar.cucmSecretName" . }}
                  key: {{ .Values.cucm.secretKeys.user }}
            - name: CUCM_JTAPI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "jtapi-sidecar.cucmSecretName" . }}
                  key: {{ .Values.cucm.secretKeys.password }}
            # Connection Pool
            - name: JTAPI_MAX_CONNECTIONS
              value: {{ .Values.connectionPool.maxConnections | quote }}
            - name: JTAPI_CONNECTION_TIMEOUT
              value: {{ .Values.connectionPool.connectionTimeout | quote }}
            - name: JTAPI_CALL_TIMEOUT
              value: {{ .Values.connectionPool.callTimeout | quote }}
            - name: JTAPI_MAX_CONCURRENT_CALLS
              value: {{ .Values.connectionPool.maxConcurrentCalls | quote }}
            {{- if .Values.websocket.enabled }}
            # WebSocket Configuration
            - name: WEBSOCKET_ENABLED
              value: "true"
            - name: WEBSOCKET_URL
              value: {{ .Values.websocket.url | quote }}
            - name: JTAPI_SERVER_ID
              value: {{ .Values.websocket.serverId | quote }}
            - name: WEBSOCKET_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "jtapi-sidecar.websocketSecretName" . }}
                  key: {{ .Values.websocket.secretKey }}
            - name: WEBSOCKET_AUTO_RECONNECT
              value: {{ .Values.websocket.autoReconnect | quote }}
            - name: WEBSOCKET_RECONNECT_DELAY
              value: {{ .Values.websocket.reconnectDelay | quote }}
            - name: WEBSOCKET_RECONNECT_MAX_DELAY
              value: {{ .Values.websocket.reconnectMaxDelay | quote }}
            - name: WEBSOCKET_BACKOFF_MULTIPLIER
              value: {{ .Values.websocket.backoffMultiplier | quote }}
            - name: WEBSOCKET_MAX_RECONNECT_ATTEMPTS
              value: {{ .Values.websocket.maxReconnectAttempts | quote }}
            - name: WEBSOCKET_HEARTBEAT_INTERVAL
              value: {{ .Values.websocket.heartbeatInterval | quote }}
            - name: WEBSOCKET_CONNECT_TIMEOUT
              value: {{ .Values.websocket.connectTimeout | quote }}
            {{- else }}
            - name: WEBSOCKET_ENABLED
              value: "false"
            {{- end }}
            {{- if .Values.minio.enabled }}
            # MinIO Configuration
            - name: MINIO_ENABLED
              value: "true"
            - name: MINIO_ENDPOINT
              value: {{ .Values.minio.endpoint | default "http://minio:9000" | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ROOT_PASSWORD
            {{- end }}
            {{- if .Values.otel.enabled }}
            # OpenTelemetry Configuration
            # Spring Boot OTLP uses HTTP/protobuf - endpoint includes /v1/traces path
            - name: OTEL_JAVAAGENT_ENABLED
              value: {{ .Values.otel.javaagentEnabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_TRACING_SAMPLING_PROBABILITY
              value: {{ .Values.otel.samplingProbability | quote }}
            {{- end }}
          {{- if .Values.healthCheck }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.jars.enabled }}
            - name: jtapi-jars
              mountPath: {{ .Values.jtapi.jarPath }}
            {{- end }}
            {{- if .Values.persistence.audio.enabled }}
            - name: jtapi-audio
              mountPath: /data
            {{- end }}
      volumes:
        {{- if .Values.persistence.jars.enabled }}
        - name: jtapi-jars
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.jars.existingClaim | default (printf "%s-jars" (include "jtapi-sidecar.fullname" .)) }}
        {{- end }}
        {{- if .Values.persistence.audio.enabled }}
        - name: jtapi-audio
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.audio.existingClaim | default (printf "%s-audio" (include "jtapi-sidecar.fullname" .)) }}
        {{- end }}

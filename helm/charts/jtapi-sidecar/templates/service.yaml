apiVersion: v1
kind: Service
metadata:
  name: {{ include "jtapi-sidecar.fullname" . }}
  labels:
    {{- include "jtapi-sidecar.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.grpc.port | default 50051 }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "jtapi-sidecar.selectorLabels" . | nindent 4 }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "syslog.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "syslog.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.udp.type }}
  ports:
    - port: {{ .Values.service.udp.port }}
      targetPort: 514
      protocol: UDP
      name: syslog
    - port: {{ .Values.service.health.port }}
      targetPort: 5514
      protocol: TCP
      name: health
  selector:
    app.kubernetes.io/name: {{ include "syslog.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}

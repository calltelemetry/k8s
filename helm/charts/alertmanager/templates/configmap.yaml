apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.fullnameOverride }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.fullnameOverride }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: {{ .Values.config.resolveTimeout }}

    route:
      receiver: {{ .Values.config.route.receiver }}
      group_by:
        {{- range .Values.config.route.groupBy }}
        - {{ . }}
        {{- end }}
      group_wait: {{ .Values.config.route.groupWait }}
      group_interval: {{ .Values.config.route.groupInterval }}
      repeat_interval: {{ .Values.config.route.repeatInterval }}
      routes:
        {{- range .Values.config.route.routes }}
        - match:
            {{- range $k, $v := .match }}
            {{ $k }}: {{ $v }}
            {{- end }}
          receiver: {{ .receiver }}
          {{- if .continue }}
          continue: true
          {{- end }}
        {{- end }}

    receivers:
      {{- range .Values.config.receivers }}
      - name: {{ .name }}
        {{- if .webhookConfigs }}
        webhook_configs:
          {{- range .webhookConfigs }}
          - url: {{ .url | quote }}
            send_resolved: {{ .sendResolved | default true }}
          {{- end }}
        {{- end }}
        {{- if .emailConfigs }}
        email_configs:
          {{- range .emailConfigs }}
          - to: {{ .to | quote }}
            send_resolved: {{ .sendResolved | default true }}
          {{- end }}
        {{- end }}
      {{- end }}
  # NOTE: Alert rules (expr/for/labels/annotations) belong in the Prometheus
  # configmap, not here. AlertManager only routes and deduplicates alerts that
  # Prometheus has already evaluated and fired.

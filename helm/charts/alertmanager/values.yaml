# AlertManager Helm Chart - CallTelemetry

fullnameOverride: "alertmanager"

image:
  repository: prom/alertmanager
  tag: v0.28.1
  pullPolicy: IfNotPresent

# AlertManager routing and receiver configuration
config:
  resolveTimeout: 5m

  route:
    receiver: calltelemetry-webhook
    groupBy: ['alertname']
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      # Critical: email direct + webhook
      - match:
          severity: critical
        receiver: critical-direct
        continue: true
      # All: webhook to API
      - receiver: calltelemetry-webhook

  receivers:
    - name: calltelemetry-webhook
      webhookConfigs:
        - url: 'http://admin-service:4000/api/internal/alertmanager-webhook'
          sendResolved: true

    - name: critical-direct
      webhookConfigs:
        - url: 'http://admin-service:4000/api/internal/alertmanager-webhook'
          sendResolved: true
      # Email config added dynamically when SMTP is synced from app

# Alert rules (mounted into Prometheus, not AlertManager)
alertRules:
  enabled: true

# Service
service:
  type: ClusterIP
  port: 9093

# Persistent storage for silences and notification state
persistence:
  enabled: true
  size: 256Mi
  storageClass: ""

# Resources
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# PostgreSQL Helm Chart - Development Defaults
# Uses CloudNativePG operator for both dev and prod
# Dev: instances: 1, small resources, no backups
# Prod: instances: 3, larger resources, S3 backups enabled
#
# Note: Credentials can be auto-generated by credential-generator pre-install hook
# To use auto-generated credentials, set existingSecret: "postgres-credentials"

# Override the chart name (defaults to "postgresql")
nameOverride: ""
# Override the full name - defaults to "postgresql" for simple service names
# CNPG creates: postgresql-rw (primary), postgresql-ro (replicas), postgresql-r (any)
fullnameOverride: "postgresql"

# CloudNativePG official PostgreSQL image
# For TimescaleDB, build a custom image based on this
image:
  repository: ghcr.io/cloudnative-pg/postgresql
  tag: "17"
  pullPolicy: IfNotPresent

# CloudNativePG Cluster configuration
cluster:
  # Number of PostgreSQL instances (1 for dev, 3+ for HA in prod)
  instances: 1

  # Database configuration
  postgresql:
    # Primary database name
    database: calltelemetry
    # Database owner username
    username: calltelemetry
    # Password (use existingSecret in production)
    password: calltelemetry_dev_password
    # Additional postgresql.conf parameters
    parameters:
      max_connections: "300"
      shared_buffers: "256MB"
      work_mem: "16MB"
      maintenance_work_mem: "128MB"
      effective_cache_size: "512MB"

  # Storage configuration
  storage:
    size: 5Gi
    # Leave empty to use cluster default (local-path on K3s)
    storageClass: ""

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Startup/liveness/readiness probe timeouts
  startDelay: 30
  stopDelay: 30

  # Primary update strategy
  primaryUpdateStrategy: unsupervised

  # Affinity rules (empty for dev)
  affinity: {}

  # Node selector (empty for dev)
  nodeSelector: {}

  # Tolerations (empty for dev)
  tolerations: []

# Credentials from existing secret (recommended for production)
# Set this to use an existing secret instead of creating one
# To use credentials from credential-generator hook, set this to:
#   existingSecret: "postgres-credentials"
# Secret keys expected:
#   POSTGRES_USER: PostgreSQL username
#   POSTGRES_PASSWORD: PostgreSQL password
existingSecret: ""

# Backup configuration (disabled by default for dev)
backup:
  enabled: false
  # Backup schedule (cron format)
  schedule: "0 0 * * *"
  # Retention policy
  retentionPolicy: "30d"
  # S3 configuration for backups
  s3:
    bucket: ""
    endpoint: ""
    region: "us-east-1"
    # Use existing secret for S3 credentials
    existingSecret: ""
    # Keys in the secret:
    #   ACCESS_KEY_ID: S3 access key
    #   ACCESS_SECRET_KEY: S3 secret key

# Monitoring configuration
monitoring:
  # Enable PodMonitor for Prometheus scraping
  enablePodMonitor: true

# Additional databases to create (besides the primary one)
additionalDatabases: []
# Example:
# - name: calltelemetry_test
#   owner: calltelemetry

# Init SQL scripts to run after database creation
initSql: []
# Example:
# - |
#   CREATE EXTENSION IF NOT EXISTS timescaledb;
#   CREATE EXTENSION IF NOT EXISTS pg_ivm;

# Service configuration
service:
  type: ClusterIP
  port: 5432
  # Annotations for the service
  annotations: {}

# PgBouncer connection pooler (optional)
pooler:
  enabled: false
  instances: 1
  type: rw  # rw (read-write) or ro (read-only)
  poolMode: transaction
  parameters:
    default_pool_size: "25"
    max_client_conn: "1000"

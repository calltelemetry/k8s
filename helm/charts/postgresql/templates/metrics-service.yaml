{{- if .Values.monitoring.enablePostgresExporter }}
# Service exposing CNPG native metrics port (9187) for Prometheus scraping
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgresql.clusterName" . }}-metrics
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    cnpg.io/cluster: {{ include "postgresql.clusterName" . }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
      protocol: TCP
  selector:
    cnpg.io/cluster: {{ include "postgresql.clusterName" . }}
    role: primary
{{- end }}

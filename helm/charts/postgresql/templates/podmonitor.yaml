{{/*
PodMonitor for Prometheus scraping of PostgreSQL metrics
This creates a Kubernetes Prometheus Operator PodMonitor CRD that Prometheus will discover and scrape.
*/}}
{{- if .Values.monitoring.enablePodMonitor }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "postgresql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
    {{- with .Values.monitoring.podMonitorLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "postgresql.clusterName" . }}
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    # CloudNativePG native metrics
    - port: metrics
      interval: 60s
      path: /metrics
      scrapeTimeout: 10s
{{- end }}

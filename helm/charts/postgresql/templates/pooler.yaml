{{/*
CloudNativePG Pooler CRD
Creates a PgBouncer connection pooler when enabled
*/}}
{{- if .Values.pooler.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "postgresql.fullname" . }}-pooler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  # Reference to the cluster
  cluster:
    name: {{ include "postgresql.clusterName" . }}

  # Number of pooler instances
  instances: {{ .Values.pooler.instances }}

  # Pooler type: rw (read-write, connects to primary) or ro (read-only, connects to replicas)
  type: {{ .Values.pooler.type }}

  # PgBouncer configuration
  pgbouncer:
    poolMode: {{ .Values.pooler.poolMode }}
    parameters:
      {{- range $key, $value := .Values.pooler.parameters }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
{{- end }}

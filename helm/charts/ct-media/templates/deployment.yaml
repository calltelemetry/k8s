apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ct-media.fullname" . }}
  labels:
    {{- include "ct-media.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ct-media.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ct-media.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: MINIO_ENDPOINT
              value: "{{ .Values.minio.endpoint }}"
            - name: MINIO_BUCKET
              value: "{{ .Values.minio.bucket }}"
            - name: MINIO_SECURE
              value: "{{ .Values.minio.secure }}"
            - name: RUST_LOG
              value: "{{ .Values.logging.rustLog }}"
            {{- if .Values.otel.enabled }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.otel.serviceName }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            {{- end }}
            {{- if .Values.minio.existingSecret }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.existingSecret }}
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.existingSecret }}
                  key: MINIO_ROOT_PASSWORD
            {{- else if .Values.minio.accessKey }}
            - name: MINIO_ACCESS_KEY
              value: "{{ .Values.minio.accessKey }}"
            - name: MINIO_SECRET_KEY
              value: "{{ .Values.minio.secretKey }}"
            {{- end }}
          {{- if .Values.healthCheck }}
          livenessProbe:
            grpc:
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
          readinessProbe:
            grpc:
              port: {{ .Values.service.port }}
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

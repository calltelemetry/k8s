# Grafana Loki - Development Defaults
# Single-binary mode with SeaweedFS S3 backend

fullnameOverride: "loki"

image:
  repository: grafana/loki
  tag: "3.3.2"
  pullPolicy: IfNotPresent

# S3 storage backend (SeaweedFS)
storage:
  backend: s3
  s3:
    endpoint: "seaweedfs:8333"
    bucketName: "loki-logs"
    accessKey: "seaweedfsadmin"
    secretKey: "seaweedfsadmin"
    insecure: true
    s3ForcePathStyle: true

# Log retention
retention:
  days: 7

# Server configuration
server:
  httpPort: 3100
  grpcPort: 9096

# Service configuration
service:
  type: ClusterIP

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

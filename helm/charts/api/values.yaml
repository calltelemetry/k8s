# Dev Password export
# kubectl -n postgres-operator get secret hippo-dev-pguser-calltelemetry -o json  | jq 'del(.metadata["namespace","creationTimestamp","resourceVersion","selfLink","uid","ownerReferences", "managedFields"])'  | kubectl apply -n ct-dev -f -
hostname: 192.168.123.205
environment: dev
resources: {}
userid: 1001
# networking:
#   external_api_port: 80
#   external_sftp_port: 22
#   external_admin_port: 443
api:
  image: calltelemetry/web
  tag: 0.8.5-rc19
  imagePullPolicy: Always
  cpus: 2
  replicas: 0
  logging_level: warning
  container_ports:
    - name: curri-api
      port: 4080
  hostname: dev.calltelemetry.com
  probesEnabled: true
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 3
    timeoutSeconds: 1
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 3
    timeoutSeconds: 1
    failureThreshold: 3
  ingress:
    annotations: {}

admin:
  image: calltelemetry/web
  tag: 0.8.5-rc19
  imagePullPolicy: Always
  replicas: 1
  cpus: 2
  logging_level: warning
  container_ports:
    - name: web-api
      port: 4000
    - name: curri-api
      port: 4080
    - name: ssh
      port: 3022
  hostname: dev.calltelemetry.com
  api_worker: false
  probesEnabled: false
  livenessProbe:
    initialDelaySeconds: 180
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 5
  readinessProbe:
    initialDelaySeconds: 180
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 3
  ingress:
    annotations:
      haproxy.org/load-balance: "roundrobin"

sftp:
  enabled: true
  image: lscr.io/linuxserver/openssh-server
  tag: latest
  imagePullPolicy: Always
  cpus: 1
  logging_level: info
  # SFTP credentials — override in your values file or use credential-generator
  username: sftpuser
  password: ""  # REQUIRED: must be set in your values override
  # Use an existing secret for SFTP credentials (keys: USER_NAME, USER_PASSWORD)
  # Set to "sftp-credentials" to use credentials from credential-generator hook
  existingSecret: ""
syslog:
  enabled: false
  tcp_port: 514
  udp_port: 514
  targetPort: 514
cdr_root_path: "/tmp"
db:
  useExistingSecret: false # Set to false to use direct values
  existingSecretName: api-db-secret # Name of the secret containing DB credentials
  values:
    db_username: ""
    db_password: ""
    db_name: calltelemetry
    db_hostname: postgresql-rw
    db_port: "5432"
    db_ssl_enabled: false
logging_level: debug
nats_server: "nats"
teams_auth_service: "teams-auth-service"

logs:
  enabled: true # Set to false only if a log volume is provided externally
  size: 1Gi # Example: "5Gi" for larger clusters
  accessModes:
    - ReadWriteOnce
  storageClassName: "" # Empty uses cluster default (local-path on K3s, do-block-storage on DO, gp3 on EKS, managed-csi on AKS)
  path: "/var/log"

# Example override snippet:
# logs:
#   enabled: true
#   size: "10Gi"
#   storageClassName: "premium-rwo"

# Ingress configuration
ingressClassName: haproxy

# JTAPI Sidecar Integration
# NOTE: Standalone JTAPI sidecars are now operator-managed via JtapiCluster CRDs
# in the jtapi-operator. This config enables the API to watch and communicate
# with sidecars created by the operator. For multi-org deployments, the operator
# manages sidecar pod lifecycle and sharding. See: ./tilt.sh up --only=jtapi-operator
# JTAPI Operator integration
jtapiOperator:
  enabled: false  # Default disabled for backward compatibility
  endpoint: "jtapi-operator:50052"

{{- if .Values.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "credential-generator.fullname" . }}
  labels:
    {{- include "credential-generator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-20"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "credential-generator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "credential-generator.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

{{- if .Values.enabled }}
{{- if .Values.autoGenerate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "credential-generator.fullname" . }}-job
  labels:
    {{- include "credential-generator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "credential-generator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: secret-generator
    spec:
      serviceAccountName: {{ include "credential-generator.fullname" . }}
      restartPolicy: Never
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: secret-generator
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          NAMESPACE={{ .Release.Namespace }}
          
          # Function to check if secret exists
          secret_exists() {
            local secret_name=$1
            kubectl get secret "$secret_name" -n "$NAMESPACE" >/dev/null 2>&1
            return $?
          }
          
          # Function to create secret if it doesn't exist
          create_secret_if_missing() {
            local secret_name=$1
            shift
            if secret_exists "$secret_name"; then
              echo "Secret $secret_name already exists, skipping"
              return 0
            fi
            echo "Creating secret $secret_name..."
            if ! kubectl create secret generic "$secret_name" -n "$NAMESPACE" "$@" 2>/dev/null; then
              echo "Failed to create secret $secret_name, it may have been created by another process"
              return 0
            fi
            echo "Successfully created secret $secret_name"
          }
          
          echo "Starting credential generation in namespace: $NAMESPACE"
          
          # PostgreSQL credentials
          echo "Processing PostgreSQL credentials..."
          PG_USERNAME="{{ .Values.postgres.username }}"
          PG_PASSWORD="{{ .Values.postgres.password }}"
          PG_SECRET="{{ .Values.postgres.secretName }}"
          
          if [ -z "$PG_USERNAME" ]; then
            PG_USERNAME="calltelemetry"
          fi
          if [ -z "$PG_PASSWORD" ]; then
            PG_PASSWORD=$(openssl rand -base64 32)
          fi
          
          create_secret_if_missing "$PG_SECRET" \
            --from-literal=POSTGRES_USER="$PG_USERNAME" \
            --from-literal=POSTGRES_PASSWORD="$PG_PASSWORD"
          
          # MinIO credentials
          echo "Processing MinIO credentials..."
          MINIO_USER="{{ .Values.minio.rootUser }}"
          MINIO_PASS="{{ .Values.minio.rootPassword }}"
          MINIO_SECRET="{{ .Values.minio.secretName }}"
          
          if [ -z "$MINIO_USER" ]; then
            MINIO_USER="minioadmin"
          fi
          if [ -z "$MINIO_PASS" ]; then
            MINIO_PASS=$(openssl rand -base64 32)
          fi
          
          create_secret_if_missing "$MINIO_SECRET" \
            --from-literal=MINIO_ROOT_USER="$MINIO_USER" \
            --from-literal=MINIO_ROOT_PASSWORD="$MINIO_PASS"
          
          # NATS credentials
          echo "Processing NATS credentials..."
          NATS_USERNAME="{{ .Values.nats.username }}"
          NATS_PASSWORD="{{ .Values.nats.password }}"
          NATS_SECRET="{{ .Values.nats.secretName }}"
          
          if [ -z "$NATS_USERNAME" ]; then
            NATS_USERNAME="nats"
          fi
          if [ -z "$NATS_PASSWORD" ]; then
            NATS_PASSWORD=$(openssl rand -base64 32)
          fi
          
          create_secret_if_missing "$NATS_SECRET" \
            --from-literal=NATS_USER="$NATS_USERNAME" \
            --from-literal=NATS_PASSWORD="$NATS_PASSWORD"
          
          echo "Credential generation completed successfully"
          echo "Generated/verified secrets:"
          kubectl get secrets -n "$NAMESPACE" -o name | grep -E 'postgres-credentials|minio-credentials|nats-credentials' || echo "No credentials found yet"
        
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 12 }}
        {{- end }}
{{- end }}
{{- end }}

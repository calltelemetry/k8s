{{/*
Grafana Datasources ConfigMap
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-datasources
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      {{- if .Values.datasources.prometheus.enabled }}
      - name: Prometheus
        type: prometheus
        access: proxy
        url: {{ include "grafana.prometheusUrl" . }}
        isDefault: true
        editable: false
      {{- end }}
      {{- if .Values.datasources.tempo.enabled }}
      - name: Tempo
        type: tempo
        access: proxy
        url: {{ include "grafana.tempoUrl" . }}
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: false
            customQuery: false
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
      {{- end }}
      {{- if .Values.datasources.loki.enabled }}
      - name: Loki
        type: loki
        access: proxy
        url: {{ include "grafana.lokiUrl" . }}
        uid: loki
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              name: TraceID
              url: "$${__value.raw}"
              urlDisplayLabel: "View Trace"
      {{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jtapi-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jtapi-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "jtapi-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jtapi-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "jtapi-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --nats-url={{ .Values.nats.url }}
          ports:
            - name: grpc
              containerPort: 50052
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: NATS_URL
              value: {{ .Values.nats.url }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | default "warn" }}
            - name: LOG_FORMAT
              value: {{ .Values.logging.format | default "json" }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

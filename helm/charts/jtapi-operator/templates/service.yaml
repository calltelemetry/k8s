apiVersion: v1
kind: Service
metadata:
  name: {{ include "jtapi-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jtapi-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8443
      targetPort: metrics
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
  selector:
    {{- include "jtapi-operator.selectorLabels" . | nindent 4 }}

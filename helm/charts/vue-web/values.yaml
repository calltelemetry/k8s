# vue-web Helm Chart - CallTelemetry Defaults
# Vue 3/Quasar SPA served by Caddy

# Override the full name - "ct-vue" is the canonical service name
fullnameOverride: "ct-vue"

replicaCount: 1

image:
  repository: calltelemetry/ct-quasar
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

# Caddy log level
logLevel: "INFO"

# API backend URL (used for runtime config injection)
api:
  # Service name of the backend API
  service: "admin-service"
  port: 4000

# Ingress configuration (disabled for dev, enabled for production)
ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts:
    - host: app.calltelemetry.com
      paths: ["/"]
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Health check configuration
healthCheck:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5

# Grafana Tempo - Development Defaults
# Single-binary mode with SeaweedFS S3 backend

fullnameOverride: "tempo"

image:
  repository: grafana/tempo
  tag: "2.6.1"
  pullPolicy: IfNotPresent

# S3 storage backend (SeaweedFS)
storage:
  backend: s3
  s3:
    endpoint: "seaweedfs:8333"
    bucket: "tempo-traces"
    accessKey: "seaweedfsadmin"
    secretKey: "seaweedfsadmin"
    insecure: true

# Trace retention
retention:
  days: 3

# Server configuration
server:
  httpPort: 3200
  grpcPort: 9095

# OTLP receiver (receives traces from OTel Collector)
receiver:
  otlp:
    grpcPort: 4317
    httpPort: 4318

# Service configuration
service:
  type: ClusterIP

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

{{/*
Grafana Tempo Configuration
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tempo.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tempo.labels" . | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: {{ .Values.server.httpPort }}
      grpc_listen_port: {{ .Values.server.grpcPort }}

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:{{ .Values.receiver.otlp.grpcPort }}"
            http:
              endpoint: "0.0.0.0:{{ .Values.receiver.otlp.httpPort }}"

    ingester:
      trace_idle_period: 10s
      max_block_bytes: 524288
      max_block_duration: 2m

    compactor:
      compaction:
        block_retention: "{{ mul .Values.retention.days 24 }}h"

    storage:
      trace:
        backend: {{ .Values.storage.backend }}
        s3:
          endpoint: {{ .Values.storage.s3.endpoint }}
          bucket: {{ .Values.storage.s3.bucket }}
          access_key: {{ .Values.storage.s3.accessKey }}
          secret_key: {{ .Values.storage.s3.secretKey }}
          insecure: {{ .Values.storage.s3.insecure }}
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks

    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal

    overrides:
      defaults:
        metrics_generator:
          processors: []

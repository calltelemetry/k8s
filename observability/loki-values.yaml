# Loki values for dev observability stack
# Single-binary mode, SeaweedFS S3 backend, 7-day retention

storage:
  backend: s3
  s3:
    endpoint: "seaweedfs:8333"
    bucketName: "loki-logs"
    accessKey: "seaweedfsadmin"
    secretKey: "seaweedfsadmin"
    insecure: true
    s3ForcePathStyle: true

retention:
  days: 7

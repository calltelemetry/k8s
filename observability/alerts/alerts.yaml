groups:
  - name: calltelemetry
    rules:
      - alert: HighErrorRate
        expr: rate(greeting_injection_count_total{status="error"}[5m]) / rate(greeting_injection_count_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High greeting injection error rate"
          description: "Error rate is above 5% for the last 5 minutes."

      - alert: CriticalErrorRate
        expr: rate(greeting_injection_count_total{status="error"}[2m]) / rate(greeting_injection_count_total[2m]) > 0.20
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical greeting injection error rate"
          description: "Error rate is above 20% for the last 2 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(greeting_injection_duration_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High greeting injection latency"
          description: "p99 latency is above 10 seconds for the last 5 minutes."

      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 2 minutes."

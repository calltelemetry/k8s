apiVersion: batch/v1
kind: Job
metadata:
  name: jtapi-seed-audio
  labels:
    app.kubernetes.io/name: jtapi-seed-audio
    app.kubernetes.io/component: setup
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jtapi-seed-audio
    spec:
      restartPolicy: OnFailure
      containers:
        - name: aws-cli
          image: amazon/aws-cli:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              S3_URL="http://seaweedfs:8333"

              echo "Waiting for SeaweedFS to be ready..."
              for i in $(seq 1 30); do
                if aws --endpoint-url "$S3_URL" s3 ls 2>/dev/null; then
                  echo "SeaweedFS is ready!"
                  break
                fi
                echo "Waiting for SeaweedFS... ($i/30)"
                sleep 2
              done

              # Ensure bucket exists
              aws --endpoint-url "$S3_URL" s3 mb s3://ct-audio 2>/dev/null || true

              # Upload greeting.wav from ConfigMap
              echo "Uploading greeting.wav to ct-audio bucket..."
              aws --endpoint-url "$S3_URL" s3 cp /seed-data/greeting.wav s3://ct-audio/greeting.wav

              # Verify upload
              echo "Verifying upload..."
              aws --endpoint-url "$S3_URL" s3 ls s3://ct-audio/greeting.wav

              echo "Audio seed complete!"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secretKey
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          volumeMounts:
            - name: seed-data
              mountPath: /seed-data
              readOnly: true
      volumes:
        - name: seed-data
          configMap:
            name: jtapi-seed-data

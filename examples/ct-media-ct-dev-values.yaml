# ct-media development values
replicaCount: 1

image:
  repository: calltelemetry/ct-media
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 50053

# MinIO configuration for dev
minio:
  endpoint: "minio:9000"
  # Reference the minio credentials secret created by minio chart
  existingSecret: "ct-minio-credentials"
  bucket: "ct-audio"
  secure: false

# Debug logging in development
logging:
  rustLog: "debug,ct_media=trace"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

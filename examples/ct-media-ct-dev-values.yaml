# ct-media development values
replicaCount: 1

image:
  repository: calltelemetry/ct-media
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 50053

# S3/SeaweedFS configuration for dev
s3:
  endpoint: "seaweedfs:8333"
  # Reference the S3 credentials secret
  existingSecret: "seaweedfs-credentials"
  bucket: "ct-audio"
  secure: false

# Debug logging in development
logging:
  rustLog: "debug,ct_media=trace"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

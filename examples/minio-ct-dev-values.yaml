# SeaweedFS Development Values for CallTelemetry
# Usage: helm install seaweedfs ./helm/charts/seaweedfs -f examples/seaweedfs-ct-dev-values.yaml
# Note: This file is maintained for backward compatibility. See seaweedfs-ct-dev-values.yaml for the canonical version.

replicaCount: 1

image:
  repository: chrislusf/seaweedfs
  tag: latest
  pullPolicy: IfNotPresent

# Development credentials (NOT for production!)
auth:
  rootUser: seaweedfsadmin
  rootPassword: seaweedfsadmin

service:
  type: ClusterIP
  apiPort: 8333
  s3Port: 8333

persistence:
  enabled: true
  size: 5Gi

# Default buckets for CallTelemetry
# ct-audio: Audio greetings (no lifecycle - kept forever)
# ct-recordings: Call recordings (365-day lifecycle)
# ct-jtapi-jars: JTAPI JAR files (no lifecycle)
buckets:
  - name: ct-audio
    policy: none
  - name: ct-recordings
    policy: none
    lifecycle:
      expiry_days: 365
  - name: ct-jtapi-jars
    policy: none

bucketInit:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

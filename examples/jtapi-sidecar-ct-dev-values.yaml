# JTAPI Sidecar Development Values for CallTelemetry
# Usage: helm install jtapi-sidecar ./helm/charts/jtapi-sidecar -f examples/jtapi-sidecar-ct-dev-values.yaml

replicaCount: 1

image:
  repository: calltelemetry/jtapi-sidecar
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

jtapi:
  port: 8080
  jarPath: /app/jars
  watchJars: true
  restartDelaySeconds: 5
  logLevel: DEBUG  # More verbose for development

# CUCM connection - update with your lab CUCM
cucm:
  host: ""
  ctiPort: 2748
  user: ""
  password: ""
  # Recommended: store credentials in a Kubernetes Secret and reference it here.
  # existingSecret: "jtapi-demo-credentials"
  # secretKeys:
  #   host: CUCM_HOST
  #   user: CUCM_JTAPI_USER
  #   password: CUCM_JTAPI_PASSWORD

# WebSocket connection to CallTelemetry API
websocket:
  enabled: true
  url: "ws://api:4000/socket/jtapi/websocket"
  serverId: "dev-jtapi-1"
  authToken: ""
  # Recommended: store token in a Kubernetes Secret.
  # existingSecret: "jtapi-websocket-auth"
  # secretKey: WEBSOCKET_AUTH_TOKEN
  autoReconnect: true
  reconnectDelay: 1000
  maxReconnectAttempts: 0  # Unlimited retries

connectionPool:
  maxConnections: 5
  connectionTimeout: 30000
  callTimeout: 60000
  maxConcurrentCalls: 20

persistence:
  jars:
    enabled: true
    size: 100Mi
  audio:
    enabled: true
    size: 500Mi

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

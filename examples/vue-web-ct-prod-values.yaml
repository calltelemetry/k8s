replicaCount: 1
environment: prod
vue_web:
  image:
    pullPolicy: Always
  port: 80
  LogLevel: "INFO"

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  ingressClassName: haproxy-ct-prod
  annotations:
    haproxy.org/cookie-strategy: "insert"
    haproxy.org/cookie-name: "CTSESSIONID"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    haproxy.org/ssl-redirect: "true"
  hosts:
    - host: prod.calltelemetry.com
      paths: ['/', '/#']
  tls:
    - secretName: prod-calltelemetry-com-tls
      hosts:
        - prod.calltelemetry.com

resources: {}

# Ingress Controller Configuration - K3s Appliance
# Single-node: all three IPs point to the same MetalLB address
ingress-controller:
  type: haproxy
  class: haproxy-ct
  selector:
    name: "haproxy-ingress"

### Load Balancer Configuration ###
# Primary API Load Balancer (CURRI)
primary_api:
  createLoadBalancer: true
  advertiseL2MetalLb: true
  metal_ip_address: "192.168.1.100"
  annotations:
    haproxy.org/service: primary-api

# Secondary API Load Balancer (CURRI failover)
secondary_api:
  createLoadBalancer: true
  advertiseL2MetalLb: true
  metal_ip_address: "192.168.1.101"
  annotations:
    haproxy.org/service: secondary-api

# Admin API Load Balancer - Management Web UI
admin_api:
  createLoadBalancer: true
  advertiseL2MetalLb: true
  metal_ip_address: "192.168.1.102"
  annotations:
    haproxy.org/service: admin-api
### /Load Balancer Configuration ###

# Standard HTTP/HTTPS ports
ports:
  http: 80
  https: 443

# TCP Services Configuration (for non-HTTP protocols)
tcpServices:
  # SFTP service
  "22":
    serviceName: sftp-service
    targetPort: 22
  # Syslog service
  "514":
    serviceName: syslog-service
    targetPort: 514

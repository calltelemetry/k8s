name: Test Helm Charts

on:
  push:
    branches: [ main ]
    paths:
      - 'helm/**'
      - 'tests/**'
      - '.github/workflows/test-charts.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'helm/**'
      - 'tests/**'
      - '.github/workflows/test-charts.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
    - name: Set up Helm
      uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
      with:
        version: 'v3.12.0'
    - name: Lint Helm charts
      run: |
        for chart in helm/charts/*; do
          if [ -d "$chart" ]; then
            echo "Linting chart: $chart"
            if grep -q '^dependencies:' "$chart/Chart.yaml"; then
              echo "Building Helm dependencies for $chart"
              if ! helm dependency build "$chart"; then
                echo "helm dependency build failed for $chart" >&2
                exit 1
              fi
            fi
            helm lint "$chart"
          fi
        done

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
    - name: Set up Helm
      uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
      with:
        version: 'v3.12.0'
    - name: Run unit tests
      run: |
        if [ -d "tests/unit" ]; then
          for test in tests/unit/*.sh; do
            if [ -x "$test" ]; then
              echo "Running unit test: $test"
              $test
            fi
          done
        else
          echo "No unit tests found"
        fi

  template-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
    - name: Set up Helm
      uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
      with:
        version: 'v3.12.0'
    - name: Test template rendering
      run: |
        for chart in helm/charts/*; do
          if [ -d "$chart" ]; then
            echo "Testing template rendering for chart: $chart"
            if grep -q '^dependencies:' "$chart/Chart.yaml"; then
              echo "Building Helm dependencies for $chart"
              if ! helm dependency build "$chart"; then
                echo "helm dependency build failed for $chart" >&2
                exit 1
              fi
            fi
            helm template test-release "$chart" --namespace test
          fi
        done

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, template-tests]
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
    - name: Set up Helm
      uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
      with:
        version: 'v3.12.0'
    - name: Set up kind
      uses: helm/kind-action@0b5c88445f37b7e12a2ce1ecca7805b9046a74db # v1
      with:
        cluster_name: chart-testing
    - name: Run integration tests
      run: |
        if [ -d "tests/integration" ]; then
          for test in tests/integration/*.sh; do
            if [ -x "$test" ]; then
              echo "Running integration test: $test"
              $test
            fi
          done
        else
          echo "No integration tests found"
        fi
    - name: Test chart installation (dry-run)
      run: |
        for chart in helm/charts/*; do
          if [ -d "$chart" ]; then
            echo "Testing installation (dry-run) for chart: $chart"
            # Skip charts that require CRDs not present in kind cluster
            if [[ "$chart" == *"ingress"* ]] || [[ "$chart" == *"postgresql"* ]]; then
              echo "Skipping dry-run for $chart (requires CRDs not in kind cluster)"
            else
              if grep -q '^dependencies:' "$chart/Chart.yaml"; then
                echo "Building Helm dependencies for $chart"
                if ! helm dependency build "$chart"; then
                  echo "helm dependency build failed for $chart" >&2
                  exit 1
                fi
              fi
              helm install test-release "$chart" --namespace test --create-namespace --dry-run
            fi
          fi
        done
